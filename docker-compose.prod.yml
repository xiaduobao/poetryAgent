# ECS 生产：从 ACR 拉取镜像，使用 .env.prod（不在 ECS / 本地 build）
# 用法：POETRY_AGENT_IMAGE=registry.cn-xxx.aliyuncs.com/ns/poetry-agent:latest \
#       docker compose -f docker-compose.prod.yml up -d --no-build --pull always
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetry
      POSTGRES_DB: poetry_agent
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetry_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  poetry-agent:
    image: ${POETRY_AGENT_IMAGE:-crpi-60eut63p9vp6h7li.ap-southeast-1.personal.cr.aliyuncs.com/bobpoc/poetryagent:latest}
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://poetry:poetry@postgres:5432/poetry_agent
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_STORAGE_URI=redis://redis:6379/1
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - CORPUS_DIR=/app/data/corpus
      - APP_ENV=production
    volumes:
      # 模型、语料、向量库单独挂载（与 .env.prod 中 /app/data/... 路径一致）
      - ./data/models:/app/data/models:ro
      - ./data/corpus:/app/data/corpus
      - ./data/chroma_db:/app/data/chroma_db
      # sessions.db、authors.json 等其余 data/ 文件
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    pull_policy: always
    restart: unless-stopped
