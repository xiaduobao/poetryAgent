# ECS 生产：从 ACR 拉取镜像，使用 .env.prod（不在 ECS / 本地 build）
# 用法：POETRY_AGENT_IMAGE=registry.cn-xxx.aliyuncs.com/ns/poetry-agent:latest \
#       docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --pull always
services:
  poetry-agent:
    image: ${POETRY_AGENT_IMAGE:-crpi-60eut63p9vp6h7li.ap-southeast-1.personal.cr.aliyuncs.com/bobpoc/poetryagent:latest}
    build: !reset null
    env_file: !reset
      - .env.prod
    environment:
      - APP_ENV=production
    ports:
      - "127.0.0.1:8000:8000"
    pull_policy: always
