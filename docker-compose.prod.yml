# 生产环境覆盖（ECS）：使用 .env.prod，从 ACR 拉取镜像
# 用法：POETRY_AGENT_IMAGE=registry.cn-xxx.aliyuncs.com/ns/poetry-agent:latest \
#       docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --pull always
services:
  poetry-agent:
    env_file: !reset
      - .env.prod
    environment:
      - APP_ENV=production
    pull_policy: always
