# 本地基础设施：仅 Postgres + Redis（应用在宿主机跑 uvicorn --reload）
# 用法：docker compose -f docker-compose.infra.yml up -d
# 停止：docker compose -f docker-compose.infra.yml down
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetry
      POSTGRES_DB: poetry_agent
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetry_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
